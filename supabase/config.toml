project_id = "ortak-kasa"

[auth]
enabled = true
site_url = "https://yunus-ozdemirr.github.io/hesap-kitap/"
additional_redirect_urls = [
  "https://yunus-ozdemirr.github.io/hesap-kitap/**",
  "http://localhost:5173/**",
  "http://127.0.0.1:5173/**",
]
enable_signup = true
minimum_password_length = 10

[auth.rate_limit]
email_sent = 30

[auth.email]
enable_signup = true
enable_confirmations = true
max_frequency = "10s"
otp_length = 6
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[functions.invite-user]
verify_jwt = true

[functions.upload-document]
verify_jwt = true
